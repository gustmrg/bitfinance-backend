services:
  bitfinance-api:
    build:
      context: ./src
      dockerfile: BitFinance.API/Dockerfile
      args:
        BUILD_CONFIGURATION: Release
    image: bitfinance-backend:latest
    container_name: bitfinance-api
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Database=Host=bitfinance-db;Port=5432;Database=${DB_NAME:-bitfinance};Username=${DB_USER:-postgres};Password=${DB_PASSWORD:-postgres}
      - ConnectionStrings__Cache=${REDIS_CONNECTION_STRING:-bitfinance-cache:6379}
      - AppSettings__CacheEnabled=${CACHE_ENABLED:-true}
      - AppSettings__LoggingEnabled=true
      - Logging__LogLevel__Default=Warning
      - Logging__LogLevel__Microsoft.AspNetCore=Warning
      - Jwt__Key=${JWT_KEY:-}
      - Jwt__Issuer=${JWT_ISSUER:-bitfinance}
      - Jwt__Audience=${JWT_AUDIENCE:-bitfinance}
      - Jwt__ExpirationInMinutes=${JWT_EXPIRATION:-60}
      - Storage__BucketName=${S3_BUCKET_NAME:-bitfinance-documents}
      - Storage__Region=${S3_REGION:-us-east-1}
    restart: unless-stopped
    networks:
      - bitfinance-network
    depends_on:
      bitfinance-db:
        condition: service_healthy
    volumes:
      - api-logs:/app/logs

  bitfinance-db:
    image: postgres:17-alpine
    container_name: bitfinance-db
    environment:
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-postgres}
      - POSTGRES_DB=${DB_NAME:-bitfinance}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - bitfinance-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-bitfinance}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bitfinance-cache:
    image: redis:7-alpine
    container_name: bitfinance-cache
    networks:
      - bitfinance-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  bitfinance-network:
    driver: bridge

volumes:
  postgres-data:
  api-logs:
