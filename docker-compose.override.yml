services:
  bitfinance-api:
    build:
      args:
        BUILD_CONFIGURATION: Debug
    image: bitfinance-backend:dev
    container_name: bitfinance-api-dev
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - AppSettings__CacheEnabled=${CACHE_ENABLED:-false}
      - Logging__LogLevel__Default=Debug
      - Logging__LogLevel__Microsoft.AspNetCore=Information
      - Jwt__Key=${JWT_KEY:-development-key-must-be-at-least-32-characters-long}
      - Jwt__Issuer=${JWT_ISSUER:-bitfinance-dev}
      - Jwt__Audience=${JWT_AUDIENCE:-bitfinance-dev}
      - Jwt__ExpirationInMinutes=${JWT_EXPIRATION:-2880}
      - Storage__ServiceUrl=http://bitfinance-storage:9000
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
    depends_on:
      bitfinance-storage:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./src

  bitfinance-db:
    container_name: bitfinance-db-dev
    ports:
      - "5432:5432"

  bitfinance-cache:
    container_name: bitfinance-cache-dev
    ports:
      - "6379:6379"

  bitfinance-storage:
    image: minio/minio
    container_name: bitfinance-storage-dev
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - minio-data:/data
    networks:
      - bitfinance-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  bitfinance-storage-init:
    image: minio/mc
    container_name: bitfinance-storage-init
    depends_on:
      bitfinance-storage:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://bitfinance-storage:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/bitfinance-documents
      "
    networks:
      - bitfinance-network

volumes:
  minio-data: